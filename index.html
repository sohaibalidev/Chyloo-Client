<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <!-- Branding -->
    <title>Chyloo</title>
    <meta
      name="description"
      content="Chyloo — a modern social platform built with React and Vite. Connect, share, and explore seamlessly."
    />
    <meta name="author" content="Muhammad Sohaib Ali" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#4361ee" />

    <!-- Canonical Link -->
    <link rel="canonical" href="https://chyloo.netlify.app/" />

    <!-- Open Graph -->
    <meta property="og:title" content="Chyloo" />
    <meta
      property="og:description"
      content="Chyloo — a modern social platform built with React and Vite. Connect, share, and explore seamlessly."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://chyloo.netlify.app/" />
    <meta property="og:image" content="https://chyloo.netlify.app/favicon.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Chyloo" />
    <meta
      name="twitter:description"
      content="Chyloo — a modern social platform built with React and Vite."
    />
    <meta name="twitter:image" content="https://chyloo.netlify.app/favicon.png" />

    <!-- Manifest (optional PWA support later) -->
    <!-- <link rel="manifest" href="/manifest.json" /> -->
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
